services:
  - type: web
    name: continuity-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    # gthread workers: sync workers buffer SSE responses, gthread doesn't —
    # the assistant's streaming chat needs deltas to flush as they arrive.
    startCommand: "gunicorn continuity.wsgi:application --worker-class gthread --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: NOTIFICATIONS_DEFAULT_TIMEZONE
        value: America/Mexico_City
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.4"

  - type: cron
    name: continuity-notifications-hourly
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "./build.sh"
    startCommand: "python manage.py send_weekly_digest && python manage.py send_daily_digest && python manage.py send_due_reminders"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: NOTIFICATIONS_DEFAULT_TIMEZONE
        value: America/Mexico_City
      - key: PYTHON_VERSION
        value: "3.12.4"
