services:
  - type: web
    name: continuity-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    # gthread workers: sync workers buffer SSE responses, gthread doesn't —
    # the assistant's streaming chat needs deltas to flush as they arrive.
    startCommand: "gunicorn continuity.wsgi:application --worker-class gthread --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: NOTIFICATIONS_DEFAULT_TIMEZONE
        value: America/Mexico_City
      - key: ANTHROPIC_API_KEY
        sync: false
      # MCP connector OAuth (Fase 1). FRONTEND_BASE_URL is where the consent
      # page lives (the app frontend, e.g. https://continuu.it). The signing
      # key for MCP access tokens is generated once and kept stable.
      - key: FRONTEND_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Alfredo <alfredo@continuu.it>"
      - key: MCP_OAUTH_SIGNING_KEY
        generateValue: true
      # Absolute URL of this backend — used to build the ICS calendar feed URL.
      - key: BACKEND_PUBLIC_URL
        value: https://continuity-backend.onrender.com
      # Google Calendar/Tasks OAuth (shared client). Set in the dashboard.
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_FRONTEND_BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.4"

  - type: cron
    name: continuity-notifications-hourly
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "./build.sh"
    startCommand: "python manage.py send_lifecycle_welcome ; python manage.py send_weekly_digest && python manage.py send_daily_digest && python manage.py send_due_reminders && python manage.py send_announcement_push && python manage.py cleanup_oauth_tokens && python manage.py detect_stalled_projects ; python manage.py run_beta_lifecycle"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Alfredo <alfredo@continuu.it>"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: NOTIFICATIONS_DEFAULT_TIMEZONE
        value: America/Mexico_City
      - key: PYTHON_VERSION
        value: "3.12.4"

  # NOTE: the beta inactivity lifecycle (run_beta_lifecycle) runs INSIDE the
  # hourly cron above (hour-gated to 15:00 UTC), not as its own service, to
  # avoid paying for a second cron. See core/management/commands/run_beta_lifecycle.py.
